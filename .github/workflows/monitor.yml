name: Blog Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごと
  workflow_dispatch:

jobs:
  check_blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install requests
      - run: python check_blog.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
